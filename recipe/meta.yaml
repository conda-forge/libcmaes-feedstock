{% set version = "0.10.2" %}

package:
  name: libcmaes
  version: {{ version }}

source:
  fn: libcmaes-{{ version }}.tar.gz
  url: https://github.com/beniz/libcmaes/archive/v{{ version }}.tar.gz
  sha256: 466e2775db4166f8a0662f0d986c637a7e36c9b8e93bc0c12cb15a884620e23d

build:
  number: 0

requirements:
  build:
    - libtool  # [unix]
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - cmake <4
    - make  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - libboost-python-devel
    - eigen <5
    - numpy
  run:
    - python

test:
  commands:
    - test -f ${PREFIX}/include/libcmaes/cmaes.h  # [unix]
    - test -f ${PREFIX}/lib/libcmaes${SHLIB_EXT}  # [unix]
  imports:
    - lcmaes

about:
  home: https://github.com/beniz/libcmaes
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING
  summary: High performance blackbox stochastic optimization using the CMA-ES algorithm

extra:
  recipe-maintainers:
    - jschueller
